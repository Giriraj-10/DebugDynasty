spring:
  datasource:
    url: jdbc:h2:mem:intellicaredb;DB_CLOSE_DELAY=-1
    driver-class-name: org.h2.Driver
    username: sa
    password: password
    
    # Example configurations for PostgreSQL:
    # url: jdbc:postgresql://localhost:5432/intellicare
    # username: postgres
    # password: yourpassword
    # driver-class-name: org.postgresql.Driver

    # Example configurations for MySQL:
    # url: jdbc:mysql://localhost:3306/intellicare?useSSL=false&serverTimezone=UTC
    # username: root
    # password: yourpassword
    # driver-class-name: com.mysql.cj.jdbc.Driver

  h2:
    console:
      enabled: true
      path: /h2-console
      settings:
        web-allow-others: true

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect
        # For PostgreSQL use: org.hibernate.dialect.PostgreSQLDialect
        # For MySQL use: org.hibernate.dialect.MySQLDialect
        format_sql: true

server:
  port: 8080

openai:
  api-key: ${OPENAI_API_KEY:your-key-here}
sarvam:
  api-key: ${SARVAM_API_KEY:your-key-here}
